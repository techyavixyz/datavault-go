{{define "cred-cards"}}
{{if .}}
{{range .}}
<div class="ic" id="cred-{{.ID}}">
  <div class="ic-hd">
    <div>
      <div class="ic-name">{{.Name}}</div>
      <div class="ic-meta">{{if .Username}}{{.Username}}@{{end}}{{.DBType}}</div>
    </div>
    <span class="badge b-{{.DBType}}">{{.DBType}}</span>
  </div>
  <div class="ic-acts">
    <button class="btn btn-secondary btn-xs" onclick="credEdit({{jsonStr .}})">Edit</button>
    <button class="btn btn-danger btn-xs" onclick="credDel('{{.ID}}','{{.Name}}')">Delete</button>
  </div>
</div>
{{end}}
{{else}}
<div class="empty" style="grid-column:1/-1">
  <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:10px;opacity:.3"><rect x="3" y="7" width="10" height="8" rx="1.5"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg>
  <div style="font-size:12px">No credential profiles yet</div>
</div>
{{end}}
{{end}}

{{define "body"}}
<div x-data="credPage()" @keydown.escape.window="modal=false">
  <div class="sh-hd">
    <div class="sh-title">Credential Profiles ({{len .Data}})</div>
    <button class="btn btn-primary btn-sm" @click="openNew()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      New Profile
    </button>
  </div>

  <div id="cred-list" class="grid">
    {{template "cred-cards" .Data}}
  </div>

  <div class="backdrop" x-show="modal" x-cloak @click.self="modal=false" style="display:none">
    <div class="modal">
      <div class="modal-hd">
        <div class="modal-title" x-text="editId ? 'Edit Credential Profile' : 'New Credential Profile'"></div>
        <button class="btn btn-ghost btn-xs" @click="modal=false" style="padding:3px 6px">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 4L4 12M4 4l8 8"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="fr">
          <div class="fg"><label>Profile Name</label><input x-model="f.name" placeholder="prod-postgres"/></div>
          <div class="fg"><label>Database Type</label>
            <select x-model="f.db_type">
              <option value="redis">redis</option>
              <option value="mongodb">mongodb</option>
              <option value="postgresql">postgresql</option>
              <option value="mysql">mysql</option>
            </select>
          </div>
        </div>
        <div class="fr">
          <div class="fg"><label>Username</label><input x-model="f.username" placeholder="optional"/></div>
          <div class="fg"><label>Password</label><input type="password" x-model="f.password" placeholder="optional"/></div>
        </div>
        <div class="fr">
          <div class="fg"><label>Access Key ID</label><input x-model="f.access_key_id" placeholder="optional"/></div>
          <div class="fg"><label>Secret Access Key</label><input type="password" x-model="f.secret_access_key" placeholder="optional"/></div>
        </div>
        <div x-show="err" class="hint" style="color:var(--er);margin-top:4px" x-text="err"></div>
      </div>
      <div class="modal-ft">
        <button class="btn btn-secondary" @click="modal=false">Cancel</button>
        <button class="btn btn-primary" @click="save()" :disabled="busy">
          <span x-show="busy" class="spin" style="width:12px;height:12px"></span>
          <span x-text="busy ? 'Saving…' : 'Save'"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
function credPage() {
  const blank = {name:'',db_type:'postgresql',username:'',password:'',access_key_id:'',secret_access_key:''};
  return {
    modal:false, busy:false, err:'', editId:null,
    f: {...blank},
    openNew() { this.f={...blank}; this.editId=null; this.err=''; this.modal=true; },
    openEdit(item) { this.f={...item}; this.editId=item.id; this.err=''; this.modal=true; },
    async save() {
      if(!this.f.name.trim()){this.err='Name required';return;}
      this.busy=true; this.err='';
      try {
        if(this.editId) await apiFetch(`/credentials/${this.editId}`,{method:'PUT',body:{...this.f,id:this.editId}});
        else            await apiFetch('/credentials',{method:'POST',body:this.f});
        this.modal=false;
        refresh('/partials/credentials','#cred-list');
      } catch(e){this.err=e.message;} finally{this.busy=false;}
    }
  };
}
function credEdit(item) { document.querySelector('[x-data]').__x.$data.openEdit(item); }
function credDel(id,name) {
  if(!confirm(`Delete "${name}"?`)) return;
  apiFetch(`/credentials/${id}`,{method:'DELETE'}).then(()=>refresh('/partials/credentials','#cred-list'));
}
</script>
{{end}}
