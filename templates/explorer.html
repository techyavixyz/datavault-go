{{define "body"}}
<div x-data="explorerPage()">
  <div class="sh-hd">
    <div class="sh-title">File Explorer</div>
    <div style="display:flex;align-items:center;gap:8px">
      <select x-model="destId" @change="load()" style="width:220px;padding:6px 10px;font-size:13px">
        <option value="">— Select destination —</option>
        {{range .Data.Dests}}
        <option value="{{.ID}}">{{.Name}} ({{.StorageType}})</option>
        {{end}}
      </select>
      <button class="btn btn-ghost btn-sm" @click="load()" :disabled="!destId">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8a5.5 5.5 0 1 0 .75-2.75"/><path d="M2 3.5l.75 2.75 2.75-.75"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="card" style="padding:0">
    <template x-if="loading">
      <div class="empty"><span class="spin" style="width:20px;height:20px"></span></div>
    </template>
    <template x-if="!loading && !destId">
      <div class="empty">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:10px;opacity:.3"><path d="M2 4h4.5l1.5 2H14v8H2z"/></svg>
        <div style="font-size:12px">Select a destination to browse files</div>
      </div>
    </template>
    <template x-if="!loading && destId && files.length===0">
      <div class="empty"><div style="font-size:12px">No files found</div></div>
    </template>
    <template x-if="!loading && files.length>0">
      <div class="tw"><table>
        <thead><tr><th>File</th><th>Path</th><th>Size</th><th>Modified</th><th></th></tr></thead>
        <tbody>
        <template x-for="f in files" :key="f.path">
          <tr>
            <td style="font-weight:500;font-family:var(--mono);font-size:11.5px" x-text="f.name"></td>
            <td style="font-size:11px;color:var(--tx3);word-break:break-all;max-width:260px" x-text="f.path"></td>
            <td class="mono" style="font-size:11.5px" x-text="fmtB(f.size)"></td>
            <td style="font-size:11.5px;color:var(--tx3)" x-text="fmtMod(f.modified)"></td>
            <td>
              <a :href="'/api/explorer/'+destId+'/download?path='+encodeURIComponent(f.path)" class="btn btn-ghost btn-xs">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3v9M4 9l4 4 4-4"/><path d="M2 13h12"/></svg>
                Download
              </a>
            </td>
          </tr>
        </template>
        </tbody>
      </table></div>
    </template>
  </div>
</div>

<script>
function explorerPage(){
  return{
    destId:'',files:[],loading:false,
    async load(){
      if(!this.destId)return;this.loading=true;
      try{this.files=await apiFetch(`/explorer/${this.destId}/files`);}
      catch(e){this.files=[];alert(e.message);}finally{this.loading=false;}
    },
    fmtB(b){if(!b)return'0 B';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(2)+' MB';},
    fmtMod(ts){if(!ts)return'—';return new Date(ts*1000).toLocaleString();}
  };
}
</script>
{{end}}
