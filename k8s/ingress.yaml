apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: datavault
  namespace: datavault
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Enable if using cert-manager for TLS:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx   # change to match your ingress controller
  rules:
    - host: backup.mogiio.com   # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: datavault
                port:
                  name: http
  tls:
    - hosts:
        - backup.mogiio.com
      secretName: datavault-tls
