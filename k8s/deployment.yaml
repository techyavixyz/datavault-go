apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: datavault
  namespace: datavault
  labels:
    app: datavault
spec:
  serviceName: datavault
  replicas: 1   # JSON file store is single-writer — do not increase without migrating to a proper DB
  selector:
    matchLabels:
      app: datavault
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: datavault
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 30
      containers:
        - name: datavault
          image: ad204476/datavault:v1.2.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: PORT
              value: "8000"
            - name: DB_PATH
              value: /data/db.json
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /signin
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /signin
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
        # storageClassName: standard   # uncomment and set to match your cluster's storage class
